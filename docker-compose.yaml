services:
  risktrace.api:
    container_name: risktrace.api
    build:
      context: .
      dockerfile: src/RiskTrace.Api/Dockerfile
    depends_on:
      risktrace.db:
        condition: service_healthy
      risktrace.redis:
        condition: service_started
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ASPNETCORE_URLS: http://+:8080
      Database__Provider: PostgreSQL
      ConnectionStrings__DefaultConnection: Host=risktrace.db;Port=5432;Database=risktrace_db;Username=postgres;Password=1234
      ConnectionStrings__Redis: risktrace.redis:6379
    ports:
      - "8080:8080"

  risktrace.db:
    container_name: risktrace_backend_db
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_DB: risktrace_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d risktrace_db"]
      interval: 10s
      timeout: 5s
      retries: 5
    ports:
      - "5433:5432"
    volumes:
      - risktrace-postgres:/var/lib/postgresql/data

  risktrace.redis:
    container_name: risktrace.redis
    image: redis:8-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

volumes:
  risktrace-postgres:
